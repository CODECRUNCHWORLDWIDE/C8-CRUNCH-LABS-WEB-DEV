# .github/workflows/test.yml
#
# Three jobs, run on every push and PR to main:
#
#   1. unit-and-component   → Vitest. The fastest, fails fast. ~30 seconds.
#   2. e2e                  → Playwright × {Chromium, Firefox, WebKit}.
#                              Depends on Vitest passing. ~5 minutes.
#   3. visual               → Playwright visual project, Chromium-only,
#                              Linux baseline canonical. ~2 minutes.
#
# Artifacts uploaded on failure:
#   - vitest-coverage:    the coverage HTML report from Vitest.
#   - playwright-report:  the full HTML report and trace zips.
#   - visual-diffs:       the side-by-side baseline / actual / diff PNGs.
#
# Reference: https://playwright.dev/docs/ci-intro

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-component:
    name: Vitest (unit + component)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright (3 browsers)
    runs-on: ubuntu-latest
    needs: unit-and-component
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Keycloak
        run: docker compose up -d keycloak

      - name: Wait for Keycloak to be ready
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8080/realms/crunch/.well-known/openid-configuration > /dev/null; then
              echo "Keycloak is ready."
              exit 0
            fi
            echo "Waiting for Keycloak ($i/60)..."
            sleep 2
          done
          echo "Keycloak failed to start in 120 seconds."
          docker compose logs keycloak
          exit 1

      - name: Run Playwright e2e suite
        run: |
          npx playwright test \
            --project=chromium \
            --project=firefox \
            --project=webkit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  visual:
    name: Playwright (visual regression)
    runs-on: ubuntu-latest
    needs: unit-and-component
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Start Keycloak
        run: docker compose up -d keycloak

      - name: Wait for Keycloak to be ready
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8080/realms/crunch/.well-known/openid-configuration > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run visual regression
        run: npx playwright test --project=visual

      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            test-results/**/*.png
            playwright-report/
          retention-days: 14
