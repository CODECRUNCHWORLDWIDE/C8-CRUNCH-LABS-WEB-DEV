<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crunch Auth (W10)</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #1d1d1f;
      }
      nav {
        padding: 1rem 0;
        border-bottom: 1px solid #ddd;
        margin-bottom: 1.5rem;
      }
      nav a {
        margin-right: 1rem;
        color: #0066cc;
        text-decoration: none;
      }
      nav a:hover {
        text-decoration: underline;
      }
      button {
        background: #0066cc;
        color: white;
        border: 0;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
      }
      button:hover {
        background: #004999;
      }
      pre {
        background: #f5f5f7;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 0.85rem;
      }
      dl dt {
        font-weight: 600;
        margin-top: 0.5rem;
      }
      dl dd {
        margin-left: 1rem;
      }
      code {
        background: #f5f5f7;
        padding: 0.125rem 0.25rem;
        border-radius: 3px;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
